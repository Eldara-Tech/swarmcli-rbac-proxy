version: "2"

linters:
  settings:
    goheader:
      template: |-
        SPDX-License-Identifier: AGPL-3.0-only
        Copyright © 2026 Eldara Tech
    errcheck:
      exclude-functions:
        - (net.Conn).Close
        - (net.Listener).Close
        - (io.Closer).Close
        - (*net/http.Server).Close
        - (*net/http.Server).Serve
        - (*bufio.ReadWriter).Read
        - (*bufio.Writer).WriteString
        - (*bufio.Writer).Flush
        - io.Copy
        - fmt.Fprint
        - fmt.Fprintf
        - os.Remove

  enable:
    - goheader

formatters:
  enable:
    - gofmt
