name: License checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  spdx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check SPDX headers
        run: |
          chmod +x ./scripts/check-spdx.sh
          ./scripts/check-spdx.sh
